<!DOCTYPE html>
<html>
    <head>
        <title>Pokemon Index</title>
        <script src="../Js/script.js"></script>
        <script src="../Json/LocalStorage.js"></script>
        <link rel="stylesheet" href="../css/stylesheet.css">
    </head>

    <body>
        <div class="header">
            <img src="../images/images.png" height="50">
            <h2 id="header-text">Pokemon Index</h2>

            <div class="navbar">
                <a href="#favorites" target="_self"><h3>Favorites</h3></a>
            </div>

        </div>

        

        <div class="search-bar" id="search-bar">
            <label for="pokemon-search">Search a pokemon:</label>
            <input type="text" id="pokemon-search" placeholder="Enter pokemon name"/>
            <button onclick="searchresult()">Search</button><br>
        </div>

        <div class="pokemon-block" id="pokemon-block" style="display: none;">

            <div class="pokemon-name" id="pokemon-name">
                <h2 id="pokemon-name-holder"></h2>
            </div>

            <div class="pokemon-sprite-holder" id="pokemon-sprite-holder">
                <img src="" alt="Pokemon sprite" id="pokemonSprite" style="display: none"/>
            </div>

            <h2 id="types-text-holder">Types</h2>
            <div class="type-display" id="type-display">

            </div>

            <h2 id="weight-text-holder">Weight</h2>
            <div class="weight-display" id="weight-display">

            </div>

            <h2 id="height-text-holder">Height</h2>
            <div class="height-display" id="height-display">

            </div>



            <h2 id="stats-text-holder">Stats</h2>
            <div class="stats" id="stats">
 
            </div>
        </div>



         <!-- 
        
        Favourite section | Was eventually dropped due to it being a bit to hard 

         <div class="favorites" id="favorites">
            
            <button onclick="" id="fav-img-but"><img src="../images/bookmark.png" height="50"/></button>
            <br>
            <label for="fav-img-but" id="fav-img-txt">Save pokemon</label>
        </div>

            -->


    </body>
</html>
